<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase — CodeAlpha E-commerce Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">🛍️ ShopEase</div>
    <div class="search">
      <input id="searchInput" type="text" placeholder="Search products...">
    </div>
    <nav class="nav-actions">
      <button id="ordersBtn" class="link-btn">My Orders</button>
      <button id="cartBtn" class="link-btn">🛒 Cart (<span id="cartCount">0</span>)</button>
      <div id="authArea"></div>
    </nav>
  </header>

  <div class="categories" id="categories"></div>

  <main class="container">
    <div id="productsGrid" class="grid"></div>
  </main>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" data-close="productModal">&times;</button>
      <div id="productDetail"></div>
    </div>
  </div>

  <!-- Cart Drawer -->
  <div id="cartDrawer" class="drawer hidden">
    <div class="drawer-header">
      <h2>Your Cart</h2>
      <button class="close-btn" data-close="cartDrawer">&times;</button>
    </div>
    <div id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
      <button id="checkoutBtn" class="primary-btn">Checkout</button>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content small">
      <button class="close-btn" data-close="authModal">&times;</button>
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      <form id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" class="primary-btn">Login</button>
        <p class="form-error" id="loginError"></p>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <input type="text" id="registerName" placeholder="Full name" required>
        <input type="email" id="registerEmail" placeholder="Email" required>
        <input type="password" id="registerPassword" placeholder="Password (min 6 chars)" required minlength="6">
        <button type="submit" class="primary-btn">Create account</button>
        <p class="form-error" id="registerError"></p>
      </form>
    </div>
  </div>

  <!-- Orders Modal -->
  <div id="ordersModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" data-close="ordersModal">&times;</button>
      <h2>My Orders</h2>
      <div id="ordersList"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
